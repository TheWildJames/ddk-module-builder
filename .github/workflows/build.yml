name: Build Module
run-name: Build ${{ inputs.module_path }} on ${{ inputs.branch }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Kernel branch (e.g., android16-6.12, android15-6.6)'
        required: true
        default: 'android13-5.15'
      ddk_version:
        description: 'DDK version (default: 20260313)'
        required: false
        default: '20260313'
      module_path:
        description: 'Module relative path in kernel tree (e.g., net/unix or net/netfilter/ipset)'
        required: true
      configs:
        description: 'Options pass to scripts/config, e.g., -m CONFIG_UNIX_DIAG or -m CONFIG_IP_SET'
        required: false
        default: ''

jobs:
  build-ko:
    name: Build module
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk-min:${{ inputs.branch }}-${{ inputs.ddk_version }}
      options: --privileged

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build 
      run: |
        BRANCH=${{ inputs.branch }}
        MODULE_PATH_RAW=${{ inputs.module_path }}
        CONFIGS="${{ inputs.configs }}"
        cat <<-EOF > info.txt
        BRANCH=$BRANCH
        MODULE_PATH=$MODULE_PATH
        CONFIGS="$CONFIGS"
        DDK_VERSION=${{ inputs.ddk_version }}
        EOF
        
        SRC=/opt/ddk/src/$BRANCH
        mkdir out
        cp $KDIR/System.map out
        mkdir mods
        OUT=$(realpath out)
        MODS=$(realpath mods)
        make -C $SRC O=$OUT gki_defconfig
        
        # Build config parameters from the input
        CONFIG_ARGS="$CONFIGS"
        
        # Apply CONFIG_CFI_ICALL_NORMALIZE_INTEGERS only for android16-6.12
        if [ "$BRANCH" = "android16-6.12" ]; then
          CONFIG_ARGS="$CONFIG_ARGS -e CONFIG_CFI_ICALL_NORMALIZE_INTEGERS"
        fi
        
        if [ -n "$CONFIG_ARGS" ]; then
          $SRC/scripts/config --file $OUT/.config $CONFIG_ARGS
        fi
        make -C $SRC O=$OUT olddefconfig
        make -C $SRC O=$OUT modules_prepare

        # Determine module path: allow an absolute repo path or a path relative to the kernel src
        if [[ "$MODULE_PATH_RAW" = /* || "$MODULE_PATH_RAW" = ./* ]]; then
          MODULE_PATH="$MODULE_PATH_RAW"
        else
          MODULE_PATH="$SRC/$MODULE_PATH_RAW"
        fi

        make -C $SRC O=$OUT M="$MODULE_PATH" modules modules_install INSTALL_MOD_PATH=$MODS

    - name: Prepare Artifacts
      run: |
        mv out/.config mods/kernel_config.txt
        mv info.txt mods

    - name: Upload kernel modules and config files
      uses: actions/upload-artifact@v7
      with:
        name: modules
        path: mods
